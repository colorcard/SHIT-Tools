name: Update Data

on:
  schedule:
    - cron: '0 20 * * *'  # 中国时间凌晨 04:00
    - cron: '0 4 * * *'   # 中国时间中午 12:00
    - cron: '0 12 * * *'  # 中国时间晚上 20:00
  workflow_dispatch:  # 允许手动触发

permissions:
  contents: write

jobs:
  update:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.x'

      - name: Install dependencies
        run: pip install requests

      - name: Run scraper
        run: python src/scraper.py --no-download

      - name: Commit and push
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add data/scraped_articles.json
          git diff --staged --quiet || git commit -m "chore: Update scraped articles data"
          git push

      - name: Trigger static deployment
        if: success()
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          gh workflow run static.yml
