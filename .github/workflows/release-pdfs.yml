name: Release PDFs

on:
  workflow_run:
    workflows: ["Update Data"]
    types:
      - completed

permissions:
  contents: write

jobs:
  release-pdfs:
    runs-on: ubuntu-latest
    if: ${{ github.event.workflow_run.conclusion == 'success' }}

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Download previous release
        continue-on-error: true
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          gh release download latest -p "shit-pdfs.zip" || echo "No previous release found"

      - name: Extract previous PDFs
        continue-on-error: true
        run: |
          if [ -f shit-pdfs.zip ]; then
            unzip -q shit-pdfs.zip
            echo "Restored $(find downloads -name '*.pdf' | wc -l) PDFs from previous release"
          fi

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.x'

      - name: Install dependencies
        run: |
          pip install -r requirements.txt

      - name: List old PDFs
        run: |
          find downloads -name '*.pdf' 2>/dev/null | sort > old_pdfs.txt || touch old_pdfs.txt

      - name: Download PDFs (incremental)
        run: |
          python src/scraper.py
          echo "Total PDFs: $(find downloads -name '*.pdf' | wc -l)"

      - name: Generate changelog
        run: |
          find downloads -name '*.pdf' | sort > new_pdfs.txt
          comm -13 old_pdfs.txt new_pdfs.txt > added_pdfs.txt
          echo "新增 $(wc -l < added_pdfs.txt) 个PDF文件"

      - name: Package PDFs
        run: |
          zip -r shit-pdfs.zip downloads/
          echo "Package size: $(du -h shit-pdfs.zip | cut -f1)"

      - name: Create release notes
        run: |
          echo "## 📦 更新内容" > release_notes.md
          echo "" >> release_notes.md
          echo "**更新时间**: $(TZ='Asia/Shanghai' date '+%Y年%m月%d日 %H:%M:%S')" >> release_notes.md
          echo "**总文件数**: $(wc -l < new_pdfs.txt)" >> release_notes.md
          echo "" >> release_notes.md
          if [ -s added_pdfs.txt ]; then
            echo "### 🆕 新增文件 ($(wc -l < added_pdfs.txt))" >> release_notes.md
            echo '```' >> release_notes.md
            cat added_pdfs.txt | sed 's|downloads/||' >> release_notes.md
            echo '```' >> release_notes.md
          else
            echo "### ℹ️ 本次无新增文件" >> release_notes.md
          fi

      - name: Delete old release
        continue-on-error: true
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          gh release delete latest --yes || echo "No previous release to delete"

      - name: Create new release
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          gh release create latest shit-pdfs.zip \
            --title "Latest PDFs - $(TZ='Asia/Shanghai' date '+%Y-%m-%d')" \
            --notes-file release_notes.md
